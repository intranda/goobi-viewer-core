<ui:composition
    xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:util="http://goobi.io/util"
	>
    <f:subview>
        <h:inputTextarea
            id="verovioInput"
            value="#{content}"
            styleClass="visually-hidden"/>

        <div class="editor editor-verovio" data-editor="verovio" data-track-progress="false" data-demo="false">
            <div class="editor-menubar" data-editor="verovio-toolbar">
                
                
                <util:icon icon="zoom-out"/> 
                <util:icon icon="zoom-in"/>
                <util:icon icon="zoom-reset"/>
                <util:icon icon="caret-left"/>
                <util:icon icon="caret-right"/>
                
                
                <!-- Zoom controls -->
                <div class="verovio__toolbar-zoom-controls"> 
                    <button
                        id="verovioZoomOut"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-zoom-out-button"
                        aria-label="#{msgs.zoomOut}"
                        title="#{msgs.zoomOut}"
                        data-bs-toggle="tooltip"
                        data-command="zoomOut">
                        <span class="fa fa-search-minus" aria-hidden="true"></span>
                    </button>
                    <button
                        id="verovioZoomIn"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-zoom-in-button"
                        aria-label="#{msgs.zoomIn}"
                        title="#{msgs.zoomIn}"
                        data-bs-toggle="tooltip"
                        data-command="zoomIn">
                        <span class="fa fa-search-plus" aria-hidden="true"></span>
                    </button>
                    <button
                        id="verovioZoomReset"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-zoom-reset-button"
                        aria-label="Reset Zoom"
                        title="Reset Zoom"
                        data-bs-toggle="tooltip"
                        data-command="resetZoom">
                        <span class="fa fa-expand" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="editor-menu-group verovio__toolbar-page-controls">
                    <button
                        id="verovioPreviousPage"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-prev"
                        aria-label="#{msgs.previous}"
                        title="#{msgs.previous}"
                        data-bs-toggle="tooltip"
                        data-command="previousPage">
                        <span class="fa fa-chevron-left" aria-hidden="true"></span>
                    </button>
                    <div class="editor-info editor-page-indicator">
                        #{msgs.seite}
                        <span class="editor-page-current">1</span>
                        #{msgs.von}
                        <span class="editor-page-count">1</span>
                    </div>
                    <button
                        id="verovioNextPage"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-next-button"
                        aria-label="#{msgs.next}"
                        title="#{msgs.next}"
                        data-bs-toggle="tooltip"
                        data-command="nextPage">
                        <span class="fa fa-chevron-right" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="editor-menu-group editor-menuicon verovio__toolbar-status-controls">
                    <button
                        id="verovioPlayMIDI"
                        type="button"
                        class="btn verovio__toolbar-btn verovio__toolbar-play-button"
                        aria-label="#{msgs.play} MIDI"
                        title="#{msgs.play} MIDI"
                        data-bs-toggle="tooltip"
                        data-command="playMidi">
                        <span class="fa fa-play" aria-hidden="true"></span>
                    </button>
                    <button
                        id="verovioPauseMIDI"
                        type="button"
                        class="btn d-none verovio__toolbar-btn verovio__toolbar-pause-button"
                        aria-label="#{msgs.pause} MIDI"
                        title="#{msgs.pause} MIDI"
                        data-bs-toggle="tooltip"
                        data-command="pauseMidi">
                        <span class="fa fa-pause" aria-hidden="true"></span>
                    </button>
                    <button
                        id="verovioStopMIDI"
                        type="button"
                        class="btn disabled verovio__toolbar-btn verovio__toolbar-stop-button"
                        aria-label="#{msgs.stop} MIDI"
                        title="#{msgs.stop} MIDI"
                        data-bs-toggle="tooltip"
                        data-command="stopMidi">
                        <span class="fa fa-stop" aria-hidden="true"></span>
                    </button>
                    <div class="editor-midi-scrubber">
                        <div class="scrubber-container verovio__toolbar-time-container">
                            <div class="current-time">0:00</div>
                            <div class="scrubber-track verovio__toolbar-track">
                                <div class="scrubber-progress verovio__toolbar-track-progress"></div>
                            </div>
                            <div class="total-time">0:00</div>
                        </div>
                    </div>
                </div>
                <div class="editor-menu-group verovio__toolbar-download-controls">
                    <div class="dropdown">
                        <button
                            class="btn editor-menuicon dropdown-toggle verovio__toolbar-download-toggle-button"
                            type="button"
                            id="verovioDownloadMenu"
                            data-bs-toggle="dropdown"
                            aria-haspopup="true"
                            aria-expanded="false">
                            <span class="fa fa-download" aria-hidden="true"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="verovioDownloadMenu">
                            <li>
                                <button
                                    id="verovioDownloadMEI"
                                    type="button"
                                    class="dropdown-item verovio__toolbar-download-mei-button"
                                    aria-label="#{msgs.downloadFile} MEI"
                                    title="#{msgs.downloadFile} MEI"
                                    data-command="downloadMEI">
                                    #{msgs.downloadFile} MEI
                                </button>
                            </li>
                            <li>
                                <button
                                    id="verovioDownloadMIDI"
                                    type="button"
                                    class="dropdown-item verovio__toolbar-download-midi-button"
                                    aria-label="#{msgs.download} MIDI"
                                    title="#{msgs.downloadFile} MIDI"
                                    data-command="downloadMIDI">
                                    #{msgs.downloadFile} MIDI
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <ui:insert />
            <h:panelGroup id="editor" class="verovio" layout="block">
            </h:panelGroup>
        </div>
    </f:subview>
</ui:composition>
