<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:jsf="http://xmlns.jcp.org/jsf">
    <composite:interface />

    <composite:implementation>
        <!-- (ADMIN) WIDGET FOR ARCHIVE INTERACTIONS -->
        <h:panelGroup rendered="#{userBean.loggedIn and userBean.admin}">
            <div
                id="widgetArchivesInteractions"
                class="widget-admin widget-archives-interactions">
                <h:form
                    id="widgetArchivesInteractionsStandardForm"
                    prependId="false">
                    <div class="widget-admin__topbar widget-archives-interactions__topbar">
                        <h2 class="widget-admin__title widget-archives-interactions__title">
                            #{msg.menuUser_workInteractions}
                        </h2>
                    </div>
                    <div class="widget-admin__body widget-archives-interactions__body">
                        <ul>
                            <!-- RE-INDEX ARCHIVE -->
                            <h:panelGroup rendered="#{userBean.admin}">
                                <li>
                                    <h:commandLink action="#{archiveBean.reIndexArchiveAction}">
                                        #{msg.archives__widget__action_reindex_archive}
                                    </h:commandLink>
                                </li>
                            </h:panelGroup>

                            <!-- DOWNLOAD EAD FILE -->
                            <h:panelGroup rendered="#{userBean.user.cmsAdmin}">
                                <li>
                                    <ui:fragment visibility-class="widget-element">
                                        <a
                                            href="#{archiveBean.eadResolverUrl}"
                                            download="true"
                                            target="_blank">
                                            #{msg.archives__widget__action_download_archive}
                                        </a>
                                    </ui:fragment>
                                </li>
                            </h:panelGroup>

                            <!-- EDIT ARCHIVE CONFIG -->
                            <h:panelGroup rendered="#{userBean.user.cmsAdmin}">
                                <li>
                                    <a
                                        href="#{navigationHelper.applicationUrl}admin/cms/archives/edit/#{archiveBean.currentArchive.resourceId}/">
                                        #{msg.archives__widget__action_edit_archive}
                                    </a>
                                </li>
                            </h:panelGroup>

                            <!-- DELETE ARCHIVE -->
                            <h:panelGroup rendered="#{userBean.admin}">
                                <li>
                                    <button
                                        class="widget-archives-interactions__delete-button"
                                        data-require-confirmation="true"
                                        data-confirmation-text="#{navigationHelper.getTranslationWithParamsUnescaped(msg.archives__widget__action_delete_confirmation)}"
                                        jsf:action="#{archiveBean.deleteArchiveAction}"
                                        aria-label="#{msg.delete}: #{ticket.id}">
                                        #{msg.archives__widget__action_delete_archive}
                                    </button>
                                </li>
                            </h:panelGroup>
                        </ul>
                    </div>
                </h:form>
            </div>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
