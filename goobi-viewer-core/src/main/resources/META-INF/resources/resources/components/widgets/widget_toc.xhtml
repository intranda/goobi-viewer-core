<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:util="http://goobi.io/util"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:o="http://omnifaces.org/ui"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="pageNummbers"
            required="false"
            default="true" />
        <composite:attribute
            name="pdfIcon"
            required="false"
            default="true" />
        <composite:attribute
            name="visible"
            required="false"
            default="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.visible and (activeDocumentBean.toc.hasChildren)}">
            <script>
                function updateToc(message) {
                    let info = JSON.parse(message);
                    if (info.iddoc) {
                        let selector = "[data-iddoc='iddoc_" + info.iddoc + "']";
                        document
                            .querySelectorAll('.widget-toc__element.active, .widget-toc__element .active')
                            .forEach((ele) => ele.classList.remove('active'));
                        document.querySelector(selector)?.classList.add('active');
                    }
                }
            </script>
            <o:socket
                channel="tocUpdateChannel"
                onmessage="updateToc" />

            <div
                id="widgetToc"
                class="widget widget-toc">
                <h:form
                    id="widgetTocForm"
                    prependId="false">
                    <!-- TITLE -->
                    <div class="widget__topbar widget-toc__topbar">
                        <div class="widget-toc__title">
                            <h2 class="widget__title">#{msg.sidebarTocAnchor}</h2>

                            <!-- EXPAND ALL -->
                            <ui:fragment rendered="#{configurationBean.sidebarTocTreeView and activeDocumentBean.toc.maxTocDepth > 0}">
                                <div class="widget-toc__title-expand">
                                    <!-- CLOSE -->
                                    <button
                                        type="button"
                                        class="btn btn--clean"
                                        data-action="collapse-all"
                                        title="#{msg.allClose}"
                                        data-toggle="tooltip"
                                        data-placement="top"
                                        aria-label="#{msg.allClose}">
                                        <util:icon
                                            icon="square-rounded-minus"
                                            svgClass="icon icon-lg" />
                                    </button>
                                    <!-- OPEN -->
                                    <button
                                        type="button"
                                        class="btn btn--clean"
                                        data-action="expand-all"
                                        title="#{msg.allOpen}"
                                        data-toggle="tooltip"
                                        data-placement="top"
                                        aria-label="#{msg.allOpen}">
                                        <util:icon
                                            icon="square-rounded-plus"
                                            svgClass="icon icon-lg" />
                                    </button>
                                </div>
                            </ui:fragment>
                        </div>
                    </div>
                    <!-- ELEMENTS -->
                    <div
                        jsf:id="sidebarTocTree"
                        class="widget__body widget-toc__body widget-toc__elements">
                        <!-- TREE VIEW -->
                        <ui:fragment rendered="#{configurationBean.sidebarTocTreeView}">
                            <ul>
                                <ui:repeat
                                    var="group"
                                    value="#{activeDocumentBean.toc.groupNames}">
                                    <ui:repeat
                                        var="tocElement"
                                        value="#{activeDocumentBean.toc.getTreeViewForGroup(group)}">
                                        <li
                                            class="widget-toc__element #{tocElement.hasChild == true ? 'parent' : 'child' } #{tocElement.iddoc == activeDocumentBean.viewManager.currentStructElementIddoc ? 'active' : ''} #{!tocElement.visible ? 'widget-toc__element--hidden' : ''} #{tocElement.expanded ? 'widget-toc__element--expanded' : ''}"
                                            data-iddoc="iddoc_#{tocElement.iddoc}"
                                            data-level="#{tocElement.level}"
                                            style="#{navigationHelper.localeString eq 'ar' or navigationHelper.localeString eq 'iw' ? 'margin-right:' : 'margin-left:'} #{tocElement.level * 15}px">
                                            <!-- EXPAND -->
                                            <ui:fragment rendered="#{tocElement.hasChild == true}">
                                                <div class="widget-toc__element-expand">
                                                    <button
                                                        type="button"
                                                        class="btn btn--clean widget-toc__toggle"
                                                        aria-expanded="#{tocElement.expanded}"
                                                        aria-label="#{tocElement.expanded ? msg.allClose : msg.allOpen}">
                                                        <util:icon
                                                            icon="square-rounded-plus"
                                                            svgClass="icon icon-lg widget-toc__icon-expand" />
                                                        <util:icon
                                                            icon="square-rounded-minus"
                                                            svgClass="icon icon-lg widget-toc__icon-collapse" />
                                                    </button>
                                                </div>
                                            </ui:fragment>

                                            <!-- FULLSCREEN LINK -->
                                            <ui:fragment rendered="#{navigationHelper.currentView == 'fullscreen'}">
                                                <div
                                                    class="widget-toc__element-link #{configurationBean.sidebarTocPageNumbersVisible ? 'has-pagenumber' : ''} #{tocElement.iddoc == activeDocumentBean.viewManager.currentStructElementIddoc ? 'active' : ''}">
                                                    <h:outputLink
                                                        rendered="#{tocElement.label != null}"
                                                        title="#{tocElement.label}"
                                                        value="#{tocElement.getUrl('fullscreen')}"
                                                        styleClass="#{tocElement.iddoc == activeDocumentBean.viewManager.currentStructElementIddoc ? 'active' : ''}">
                                                        <f:passThroughAttribute
                                                            name="aria-label"
                                                            value="#{msg.sidebarTocAnchor}: #{tocElement.label}, #{tocElement.logId}" />
                                                        #{tocElement.label}
                                                    </h:outputLink>
                                                </div>
                                            </ui:fragment>

                                            <!-- LINK -->
                                            <ui:fragment rendered="#{navigationHelper.currentView != 'fullscreen'}">
                                                <div
                                                    class="widget-toc__element-link #{configurationBean.sidebarTocPageNumbersVisible ? 'has-pagenumber' : ''} #{tocElement.iddoc == activeDocumentBean.viewManager.currentStructElementIddoc ? 'active' : ''}">
                                                    <h:outputLink
                                                        rendered="#{tocElement.label != null}"
                                                        title="#{tocElement.label}"
                                                        value="#{tocElement.url}">
                                                        <f:passThroughAttribute
                                                            name="aria-label"
                                                            value="#{msg.sidebarTocAnchor}: #{tocElement.label}, #{tocElement.logId}" />
                                                        #{tocElement.label}
                                                    </h:outputLink>
                                                </div>
                                            </ui:fragment>

                                            <!-- PAGE NUMBER -->
                                            <ui:fragment rendered="#{configurationBean.sidebarTocPageNumbersVisible}">
                                                <div class="widget-toc__element-pagenumber">#{tocElement.pageNoLabel}</div>
                                            </ui:fragment>
                                        </li>
                                    </ui:repeat>
                                </ui:repeat>
                            </ul>
                        </ui:fragment>

                        <!-- NON TREE VIEW -->
                        <ui:fragment rendered="#{!configurationBean.sidebarTocTreeView}">
                            <ul>
                                <ui:repeat
                                    var="group"
                                    value="#{activeDocumentBean.toc.groupNames}">
                                    <ui:repeat
                                        var="tocElement"
                                        value="#{activeDocumentBean.toc.getViewForGroup(group)}">
                                        <li
                                            class="widget-toc__element #{tocElement.hasChild == true ? 'parent' : 'child' }"
                                            data-logid="#{tocElement.logId}"
                                            style="#{navigationHelper.localeString eq 'ar' or navigationHelper.localeString eq 'iw' ? 'margin-right:' : 'margin-left:'} #{tocElement.level * 15}px">
                                            <!-- LINK -->
                                            <div
                                                class="widget-toc__element-link #{!configurationBean.sidebarTocTreeView ? 'non-tree-view' : ''} #{configurationBean.sidebarTocPageNumbersVisible ? 'has-pagenumber' : ''}">
                                                <h:outputLink
                                                    rendered="#{tocElement.label != null}"
                                                    title="#{tocElement.label}"
                                                    value="#{tocElement.url}"
                                                    styleClass="#{tocElement.iddoc == activeDocumentBean.viewManager.currentStructElementIddoc ? 'active' : ''}">
                                                    <h:outputText value="#{tocElement.label}" />
                                                    <f:passThroughAttribute
                                                        name="aria-label"
                                                        value="#{msg.sidebarTocAnchor}: #{tocElement.label}, #{tocElement.logId}" />
                                                </h:outputLink>
                                            </div>
                                            <!-- PAGE NUMBER -->
                                            <ui:fragment rendered="#{configurationBean.sidebarTocPageNumbersVisible}">
                                                <div class="widget-toc__element-pagenumber">
                                                    <h:outputText value="#{tocElement.pageNoLabel}" />
                                                </div>
                                            </ui:fragment>
                                        </li>
                                    </ui:repeat>
                                </ui:repeat>
                            </ul>
                        </ui:fragment>
                    </div>
                </h:form>
            </div>

            <script type="text/javascript">viewerJS.widgetToc.init();</script>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
