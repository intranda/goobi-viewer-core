<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface />

    <composite:implementation>
        <h:panelGroup rendered="#{activeDocumentBean.viewManager.calendarView.display}">
            <div
                id="widgetCalendar"
                class="widget widget-calendar">
                <div class="widget__body widget-calendar__body">
                    <div
                        id="calendarWidgetContainer"
                        data-anchor-pi="#{activeDocumentBean.viewManager.calendarView.anchorPi}"
                        data-current-year="#{activeDocumentBean.viewManager.topStructElement.getMetadataValue('YEAR')}"
                        data-current-date="#{activeDocumentBean.viewManager.currentStructElement.getMetadataValue('YEARMONTHDAY')}"
                        data-locale="#{navigationHelper.localeString}"
                        data-app-url="#{navigationHelper.applicationUrl}" />
                </div>
            </div>

            <script type="text/javascript">
//<![CDATA[
(function() {
    var el = document.getElementById('calendarWidgetContainer');
    if (!el) return;

    var rawDate = el.dataset.currentDate;
    var currentIssueDate = null;
    if (rawDate && rawDate.length === 8) {
        currentIssueDate = rawDate.substring(0, 4) + '-' + rawDate.substring(4, 6) + '-' + rawDate.substring(6, 8);
    }

    console.group('[calendarWidget] init data');
    console.log('anchorPi:        ', el.dataset.anchorPi);
    console.log('currentYear:     ', el.dataset.currentYear);
    console.log('rawDate (YEARMONTHDAY):', rawDate || '(leer)');
    console.log('currentIssueDate:', currentIssueDate || '(null)');
    console.groupEnd();

    viewerJS.calendarWidget.init({
        container: el,
        anchorPi: el.dataset.anchorPi,
        currentYear: el.dataset.currentYear,
        locale: el.dataset.locale,
        appUrl: el.dataset.appUrl,
        currentIssueDate: currentIssueDate
    });
})();
//]]>
            </script>
        </h:panelGroup>
    </composite:implementation>
</ui:composition>
