<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <h:panelGroup
            layout="block"
            styleClass="content-component content-component__statistics-chart -width-100 statistics-chart statistics-chart--import-summary"
            id="chart-import-summary">
            <h2>#{msg.cms_component__chart_import_summary__label}</h2>
            <canvas id="canvas-import-summary" />
        </h:panelGroup>

        <script type="text/javascript">
            (function() {
                viewerJS.statistics.charts.renderImportSummary(
                    'canvas-import-summary',
                    '#{request.contextPath}/api/v1/statistics/index/imports-summary',
                    '#{msg.statistics_importedPages}',
                    '#{msg.statistics_importedFullTexts}'
                );
            })();
        </script>
    </composite:implementation>
</ui:composition>
