<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.component.hasAccess(userBean.user)}">
            <h:panelGroup
                layout="block"
                styleClass="content-component content-component__statistics-chart -width-100 statistics-chart statistics-chart--publication-centuries #{cc.attrs.hideOnScreenSizes} #{cc.attrs.hideOnScreenSizes == 'hideMobile' ? '-hiddenOnMobile' : ''} #{cc.attrs.hideOnScreenSizes == 'hideDesktop' ? '-hiddenOnDesktop' : ''} #{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user) ? '-isPrivate' : ''}"
                style="max-width: 800px;"
                id="chart-publication-centuries">
                <ui:fragment rendered="#{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user)}">
                    <div class="content-component__not-published-info">#{msg.cms__content_not_published_yet}</div>
                </ui:fragment>
                <h2>#{msg.cms_component__chart_publication_centuries__label}</h2>
                <h:panelGroup
                    layout="block"
                    styleClass="statistics-chart__canvas-wrap">
                    <canvas id="canvas-publication-centuries" />
                </h:panelGroup>
            </h:panelGroup>

            <script type="text/javascript">
                (function() {
                    const filter = '#{cc.attrs.component.getContent("filter").filterQuery}';
                    const url = new URL('#{request.contextPath}/api/v1/statistics/index/publication-centuries', window.location.origin);
                    if (filter) {
                        url.searchParams.set('filter', filter);
                    }
                    viewerJS.statistics.charts.renderPublicationCenturies(
                        'canvas-publication-centuries',
                        url.toString()
                    );
                })();
            </script>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
