<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.component.hasAccess(userBean.user)}">
            <h:panelGroup
                layout="block"
                styleClass="content-component content-component__statistics-chart -width-100 statistics-chart statistics-chart--publication-types #{cc.attrs.hideOnScreenSizes} #{cc.attrs.hideOnScreenSizes == 'hideMobile' ? '-hiddenOnMobile' : ''} #{cc.attrs.hideOnScreenSizes == 'hideDesktop' ? '-hiddenOnDesktop' : ''} #{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user) ? '-isPrivate' : ''}"
                style="max-width: 800px;"
                id="chart-publication-types">
                <ui:fragment rendered="#{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user)}">
                    <div class="content-component__not-published-info">#{msg.cms__content_not_published_yet}</div>
                </ui:fragment>
                <h2>#{msg.cms_component__chart_publication_types__label}</h2>
                <h:panelGroup
                    layout="block"
                    styleClass="statistics-chart__canvas-wrap">
                    <canvas id="canvas-publication-types" />
                </h:panelGroup>
            </h:panelGroup>

            <script type="text/javascript">
                (function() {
                    // Filter comes from the admin-edited CMSStatisticsFilterContent attached to the "filter" item
                    // defined in chartPublicationTypes.xml. EL renders an empty string if no content is persisted yet,
                    // which the `if (filter)` guard below treats as "no filter".
                    const filter = '#{cc.attrs.component.getContent("filter").filterQuery}';
                    let url = '#{request.contextPath}/api/v1/statistics/index/publication-types?lang=#{navigationHelper.localeString}';
                    if (filter) {
                        // Use the XML entity here because Facelets parses this script block as XML;
                        // JS still receives a single ampersand at runtime.
                        url += ' &amp; filter=' + encodeURIComponent(filter);
                    }
                    viewerJS.statistics.charts.renderPublicationTypes(
                        'canvas-publication-types',
                        url,
                        '#{request.contextPath}/search/',
                        filter
                    );
                })();
            </script>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
