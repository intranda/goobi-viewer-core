<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <h:panelGroup
            layout="block"
            styleClass="statistics-chart statistics-chart--import-trend"
            id="chart-import-trend-#{cc.attrs.component.id}">
            <h2>#{msg.cms_component__chart_import_trend__label}</h2>
            <canvas id="canvas-import-trend-#{cc.attrs.component.id}" />
        </h:panelGroup>

        <script type="text/javascript">
            (function() {
                viewerJS.statistics.charts.renderImportTrend(
                    'canvas-import-trend-#{cc.attrs.component.id}',
                    '#{request.contextPath}/api/v1/statistics/index/import-trend?days=180 &amp; buckets=12'
                );
            })();
        </script>
    </composite:implementation>
</ui:composition>
