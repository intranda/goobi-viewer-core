<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.component.hasAccess(userBean.user)}">
            <h:panelGroup
                layout="block"
                styleClass="content-component content-component__statistics-chart -width-100 statistics-chart statistics-chart--import-trend #{cc.attrs.hideOnScreenSizes} #{cc.attrs.hideOnScreenSizes == 'hideMobile' ? '-hiddenOnMobile' : ''} #{cc.attrs.hideOnScreenSizes == 'hideDesktop' ? '-hiddenOnDesktop' : ''} #{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user) ? '-isPrivate' : ''}"
                style="max-width: 800px;"
                id="chart-import-trend">
                <ui:fragment rendered="#{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user)}">
                    <div class="content-component__not-published-info">#{msg.cms__content_not_published_yet}</div>
                </ui:fragment>
                <h2>#{msg.cms_component__chart_import_trend__label}</h2>
                <h:panelGroup
                    layout="block"
                    styleClass="statistics-chart__canvas-wrap">
                    <canvas id="canvas-import-trend" />
                </h:panelGroup>
            </h:panelGroup>

            <script type="text/javascript">
                // Defaults (days=180, buckets=12) match IndexStatisticsResource @DefaultValue annotations,
                // so we omit query params here to keep the URL whitespace-safe across formatter passes.
                (function() {
                    viewerJS.statistics.charts.renderImportTrend(
                        'canvas-import-trend',
                        '#{request.contextPath}/api/v1/statistics/index/import-trend'
                    );
                })();
            </script>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
