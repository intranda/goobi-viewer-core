<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:util="http://goobi.io/util"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
	xmlns:widgetComponent="http://xmlns.jcp.org/jsf/composite/components/widgets"
	xmlns:adminWidget="http://xmlns.jcp.org/jsf/composite/admin/widgets"
	template="/resources/themes/#{navigationHelper.theme}/templateAdmin.html">

	<ui:define name="metadata">
		<f:metadata>
			<f:event type="preRenderView" listener="#{navigationHelper.setCurrentPageAdmin('adminCmsArchive')}" />
		</f:metadata>
	</ui:define>

    <ui:define name="content">

        <div id="recordNote" class="record-notes">

            <f:view contentType="text/html" encoding="utf-8">

                <h:panelGroup id="mainGroup" layout="block" rendered="#{userBean.user.cmsAdmin}">
				<!-- TITLE -->
				<div class="admin__title-bar">
					<h1 class="admin__title">#{msg.admin__cms_archives_edit}</h1>
				</div>
				
				<viewerComponent:adminBreadcrumbs />

				<div class="admin__content-inner-content">

						<h:form id="cmsEditArchiveConfigForm" prependId="false">

							<h2>#{msg.description}</h2>
							<div class="admin__cms-edit-collection-translation-box">
								<h:panelGroup id="descriptionGroup">

									<!-- LANGUAGE TABS -->
									<div class="admin__language-tabs">
										<viewerComponent:localeSelector
											object="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.description}"
											render="descriptionGroup" execute="descriptionGroup" />
									</div>

									<div class="admin__default-block">
										<div class="form-group form-row">
											<div class="col-2">#{msg.description}:</div>
											<div class="col-10">
												<div class="#{status.index == 0 ? 'active' : ''}"
													id="descriptionLanguage-#{status.index}">
													<h:inputTextarea
														value="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.description.text}"
														styleClass="form-control tinyMCE -validation-input">
														<f:passThroughAttribute name="aria-label"
															value="#{msg.aria_label__collections_description}" />
														<!-- f:ajax execute="@this" event="valueChange" / -->
													</h:inputTextarea>
												</div>
											</div>
										</div>
									</div>

								</h:panelGroup>
							</div>

							<h2>#{msg.admin__cms_archives_preview_text}</h2>
							<div class="admin__cms-edit-collection-translation-box">
								<h:panelGroup id="previewTextGroup">

									<div class="admin__language-tabs">
										<viewerComponent:localeSelector
											object="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.previewText}"
											render="previewTextGroup" execute="previewTextGroup" />
									</div>

									<div class="admin__default-block">
										<div class="form-group form-row">
											<div class="col-2">#{msg.previewText}:</div>
											<div class="col-10">
												<div class="#{status.index == 0 ? 'active' : ''}"
													id="descriptionLanguage-#{status.index}">
													<h:inputTextarea
														value="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.previewText.text}"
														styleClass="form-control tinyMCE -validation-input">
														<f:passThroughAttribute name="aria-label"
															value="#{msg.aria_label__collections_description}" />
														<f:ajax execute="@this" event="valueChange" />
													</h:inputTextarea>
												</div>
											</div>
										</div>
									</div>

								</h:panelGroup>
							</div>

							<!-- IMAGE -->
							<h2>#{msg.admin__cms_archives_image}</h2>
							<div class="admin__default-block">
								<p class="admin__boxed-entry-description">#{msg.admin__cms_archives_image_desc}</p>

								<h:panelGroup layout="block" id="imageModeGroup"
									styleClass="admin__cms-edit-collection-image-actions-wrapper">

									<div
										class="form-group admin__cms-edit-collection-connected-radio-buttons">
										<div class="connected-top">
											<h:selectOneRadio group="imageModeRadio"
												value="#{cmsArchivesBean.imageMode}" immediate="true">
												<f:selectItem itemValue="NONE"
													itemLabel="#{msg.admin__cms_collections_image_mode_none}" />
												<f:ajax render="imageModeGroup" />
											</h:selectOneRadio>
										</div>
										<div class="connected-bottom">
											<h:selectOneRadio group="imageModeRadio"
												value="#{cmsArchivesBean.imageMode}" immediate="true">
												<f:selectItem itemValue="IMAGE"
													itemLabel="#{msg.admin__cms_collections_image_mode_upload}" />
												<f:ajax render="imageModeGroup" />
											</h:selectOneRadio>
										</div>
									</div>


									<h:panelGroup layout="block"
										styleClass="admin__cms-edit-collection-wrapper-choose-image"
										id="mediaGroup"
										rendered="#{cmsArchivesBean.imageMode == 'IMAGE'}">
										<!-- THUMBNAIL -->
										<div class="admin__cms-edit-collection-image-thumbnail">
											<ui:fragment
												rendered="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.hasMediaItem()}">
												<img
													src="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.mediaItem.iconURI}"
													class="img-fluid" alt="" />
											</ui:fragment>
											<ui:fragment
												rendered="#{!cmsArchivesBean.selectedArchiveWrapper.archiveConfig.hasMediaItem()}">
												<img src="#{imageDelivery.thumbs.getThumbnailPath(null)}"
													data-viewer-thumbnail="thumbnail" class="img-fluid" alt="" />
											</ui:fragment>
										</div>

										<!-- ACTIONS -->
										<div class="admin__cms-edit-collection-image-actions">
											<h:commandLink
												action="#{cmsBean.setSelectedMediaHolder(cmsArchivesBean.selectedArchiveWrapper.archiveConfig)}"
												value="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.getMediaItem() == null ? msg.cms_selectMedia : msg.cms_media_editFile}"
												class="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.getMediaItem() == null ? 'btn btn--default' : ''}"
												role="button">
												<f:ajax execute="@form" render="mediaSelectPanel" />
											</h:commandLink>
											<h:commandLink
												rendered="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.getMediaItem() != null}"
												action="#{cmsArchivesBean.selectedArchiveWrapper.archiveConfig.setMediaItem(null)}"
												value="#{msg.cms_selectMediaItem_deselect}" class="-redlink"
												role="button">
												<f:ajax render="mediaGroup" />
											</h:commandLink>
										</div>

									</h:panelGroup>

								</h:panelGroup>
							</div>

							<!-- SAVE/CANCEL BUTTONS -->
							<div class="admin__final-actions">

								<a class="btn btn--cancel" href="/admin/cms/archives/">
									#{msg.button__abort} </a>
								<button class="btn btn--success"
									jsf:action="#{cmsArchivesBean.saveSelectedArchiveAction}">
									#{msg.button__save}</button>
							</div>

							<h:panelGroup id="mediaSelectPanel">
								<ui:fragment rendered="#{cmsBean.hasSelectedMediaHolder()}">
									<div class="admin-cms-media-select-overlay">

										<!-- SELECT MEDIA ITEM OVERLAY -->
										<div class="admin-cms-media__select-overlay"></div>

										<!-- SELECT MEDIA ITEM -->
										<div class="admin-cms-media__select">
											<ui:include src="/resources/cms/includes/mediaSelect.xhtml">
												<ui:param name="mediaDisplayPanel" value="mediaGroup" />
												<ui:param name="fileTypes"
													value="#{cmsMediaBean.getImageTypes()}" />
												<ui:param name="fileTypeValidator"
													value="#{cmsMediaBean.getImageFilter()}" />
											</ui:include>
										</div>
									</div>
								</ui:fragment>
							</h:panelGroup>

						</h:form>

					</div>
                </h:panelGroup>
			
	        <script>

	        viewerJS.jsfAjax.success.pipe(rxjs.operators.merge(rxjs.fromEvent(window, "load")))
	        .subscribe(e => {
				$("[data-target='isChecked'] input").prop("checked", true);
				$("[data-target='blurIfUnchecked'] input").prop("checked", false);
	        })
	        </script>
		</f:view>
		</div>
	</ui:define>
</ui:composition>
