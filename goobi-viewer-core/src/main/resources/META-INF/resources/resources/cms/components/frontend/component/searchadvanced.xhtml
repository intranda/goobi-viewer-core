<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.component.hasAccess(userBean.user)}">
            <div
                class="content-component content-component__search-advanced -width-#{cc.attrs.width} #{cc.attrs.hideOnScreenSizes == 'hideMobile' ? '-hiddenOnMobile' : ''} #{cc.attrs.hideOnScreenSizes == 'hideDesktop' ? '-hiddenOnDesktop' : ''} #{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user) ? '-isPrivate' : ''}">
                <ui:fragment rendered="#{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user)}">
                    <div class="content-component__not-published-info">#{msg.cms__content_not_published_yet}</div>
                </ui:fragment>

                <ui:fragment rendered="#{cc.attrs.component.getContentData('heading') != ''}">
                    <h1>
                        <h:outputText
                            escape="false"
                            value="#{cc.attrs.component.getContentData('heading')}" />
                    </h1>
                </ui:fragment>

                <ui:fragment rendered="#{cc.attrs.component.hasContent('advancedsearch')}">
                    <c:set
                        var="advContent"
                        value="#{cc.attrs.component.getContent('advancedsearch')}" />

                    <h:panelGroup rendered="#{!advContent.isEmpty() and !advContent.isTemplateValid()}">
                        <div
                            class="alert alert-warning"
                            role="alert">
                            <h:outputText value="#{msg.cms_component__search_advanced__template_invalid}" />
                        </div>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{advContent.isEmpty() or advContent.isTemplateValid()}">
                        <ui:include src="/resources/includes/search/searchAdvanced.xhtml">
                            <ui:param
                                name="hideEntityTabs"
                                value="true" />
                        </ui:include>
                    </h:panelGroup>
                </ui:fragment>
            </div>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
