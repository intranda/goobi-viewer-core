<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="component"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <ui:fragment rendered="#{cc.attrs.component.hasAccess(userBean.user)}">
            <div
                class="content-component content-component__search-quick-filters -width-#{cc.attrs.width} #{cc.attrs.hideOnScreenSizes == 'hideMobile' ? '-hiddenOnMobile' : ''} #{cc.attrs.hideOnScreenSizes == 'hideDesktop' ? '-hiddenOnDesktop' : ''} #{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user) ? '-isPrivate' : ''}">
                <ui:fragment rendered="#{cc.attrs.component.isPrivate() and cc.attrs.component.hasAccess(userBean.user)}">
                    <div class="content-component__not-published-info">#{msg.cms__content_not_published_yet}</div>
                </ui:fragment>

                <ui:fragment rendered="#{cc.attrs.component.getContentData('heading') != ''}">
                    <h2 class="content-component__search-quick-filters-heading">
                        <h:outputText
                            escape="false"
                            value="#{cc.attrs.component.getContentData('heading')}" />
                    </h2>
                </ui:fragment>

                <ui:include src="/resources/includes/search/searchStandard.xhtml">
                    <ui:param
                        name="searchParam"
                        value="#{searchBean}" />
                    <ui:param
                        name="cmsPlaceholder"
                        value="#{cc.attrs.component.getContentData('placeholder')}" />
                    <ui:param
                        name="quickFiltersInitOpen"
                        value="#{cc.attrs.quickFiltersOpen == 'open'}" />
                    <ui:param
                        name="quickFiltersEnabled"
                        value="#{searchBean.quickFiltersEnabled}" />
                </ui:include>
            </div>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
