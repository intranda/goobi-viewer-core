<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
    xmlns:adminWidget="http://xmlns.jcp.org/jsf/composite/admin/widgets"
    template="/resources/themes/#{navigationHelper.theme}/templateAdmin.html">
    <ui:define name="metadata">
        <f:metadata>
            <f:event
                type="preRenderView"
                listener="#{navigationHelper.setCurrentPageAdmin('adminCmsArchives')}" />
            <f:event
                type="preRenderView"
                listener="#{cmsArchivesBean.setSelectedResourceId('')}" />
        </f:metadata>
    </ui:define>

    <ui:define name="content">
        <div
            id="archives"
            class="admin__archives">
            <h:panelGroup rendered="#{userBean.admin}">
                <h:form
                    id="adminAllCMSArchiveConfigurationsForm"
                    prependId="false">
                    <div class="admin__title-bar">
                        <!-- TITLE -->
                        <h1 class="admin__title">#{msg.admin__cms_archives}</h1>
                    </div>

                    <viewerComponent:adminBreadcrumbs />

                    <div class="admin__content-inner-content">
                        <!-- GENERAL DESCRIPTION -->
                        <div class="admin__info-text">#{msg.admin__cms_archives_desc}</div>

                        <!-- EMPTY STATE -->
                        <h:panelGroup rendered="#{empty cmsArchivesBean.pageArchiveWrappers}">
                            <p class="admin__info-text">#{msg.hitsZero}</p>
                        </h:panelGroup>

                        <!-- ARCHIVE CARDS -->
                        <h:panelGroup
                            rendered="#{not empty cmsArchivesBean.pageArchiveWrappers}"
                            layout="block"
                            styleClass="admin__entry-list -w33">
                            <ui:repeat
                                var="archiveWrapper"
                                value="#{cmsArchivesBean.pageArchiveWrappers}">
                                <div class="admin__boxed-entry -w33 admin__archives-card">
                                    <!-- CARD IMAGE -->
                                    <div class="admin__archives-card__image">
                                        <ui:fragment rendered="#{archiveWrapper.archiveConfig.hasMediaItem()}">
                                            <img
                                                src="#{archiveWrapper.archiveConfig.mediaItem.getIconURI()}"
                                                alt="#{archiveWrapper.archiveConfig.mediaItem.alternativeText != '' ? archiveWrapper.archiveConfig.mediaItem.alternativeText : archiveWrapper.archiveResource.resourceName}" />
                                        </ui:fragment>
                                        <ui:fragment rendered="#{!archiveWrapper.archiveConfig.hasMediaItem()}">
                                            <div class="admin__archives-card__image-placeholder"></div>
                                        </ui:fragment>
                                    </div>
                                    <!-- CARD CONTENT -->
                                    <div class="admin__archives-card__content">
                                        <h2>#{archiveWrapper.archiveResource.resourceName}</h2>
                                        <ui:fragment rendered="#{not empty archiveWrapper.archiveConfig.description}">
                                            <div class="admin__archives-card__description">
                                                <h:outputText
                                                    value="#{archiveWrapper.archiveConfig.getShortDescription(200)}" />
                                            </div>
                                        </ui:fragment>
                                    </div>
                                    <!-- CARD ACTIONS -->
                                    <div class="row admin__boxed-entry-actions">
                                        <div class="col-3 d-flex">
                                            <a
                                                href="#{navigationHelper.applicationUrl}admin/cms/archives/edit/#{archiveWrapper.archiveResource.resourceId}/"
                                                class="admin__boxed-entry-actions-edit"
                                                aria-label="#{msg.edit}: #{archiveWrapper.archiveResource.resourceName}">
                                                #{msg.edit}
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </ui:repeat>
                        </h:panelGroup>
                    </div>
                </h:form>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>
