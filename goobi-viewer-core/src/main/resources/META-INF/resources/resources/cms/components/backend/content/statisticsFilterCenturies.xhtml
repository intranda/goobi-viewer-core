<ui:composition
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <!--
        Backend editor for CMSStatisticsFilterContent on the publication-centuries chart. Same Solr-filter input
        as the generic statisticsFilter.xhtml editor, plus a checkbox for the chart's logarithmic-scale toggle.
        A separate editor (rather than parameterising the generic one) so the languages and top-collections
        charts don't show a meaningless checkbox.
    -->
    <composite:interface>
        <composite:attribute
            name="contentItem"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <div class="admin__content-item-statistics-filter">
            <!-- SOLR FILTER INPUT — identical to statisticsFilter.xhtml -->
            <div class="admin__content-component-input-group">
                <div class="admin__content-component-input-label">
                    <label for="solrQueryInput">#{msg.cms_itemSolrQuery}:</label>
                </div>
                <div class="admin__content-component-input-field">
                    <h:panelGroup id="solrQueryInputGroup">
                        <div class="cms-module__option-message">
                            <h:messages
                                for="solrQueryInput"
                                infoClass="cms-module__option-message-status success"
                                warnClass="cms-module__option-message-status warning"
                                errorClass="cms-module__option-message-status danger" />

                            <div class="cms-module__option-message-mark">
                                <i
                                    class="fa fa-check"
                                    aria-hidden="true" />
                                <i
                                    class="fa fa-exclamation"
                                    aria-hidden="true" />
                            </div>
                        </div>
                        <h:inputText
                            id="solrQueryInput"
                            value="#{cc.attrs.contentItem.content.filterQuery}"
                            styleClass="form-control">
                            <f:validator
                                validatorId="solrQueryValidator"
                                for="solrQueryInput" />
                            <f:ajax
                                event="blur"
                                render="solrQueryInputGroup" />
                            <f:passThroughAttribute
                                name="aria-label"
                                value="#{msg.cms_itemSolrQuery}" />
                            <f:passThroughAttribute
                                name="placeholder"
                                value="#{msg.cms__statistics_filter_placeholder}" />
                        </h:inputText>
                    </h:panelGroup>
                </div>
            </div>

            <!-- LOGARITHMIC-SCALE CHECKBOX — chart-specific extra option -->
            <div class="admin__content-component-input-group">
                <div class="admin__content-component-input-label">
                    <label for="logarithmicScale">#{msg.cms__statistics_filter_log_scale_label}:</label>
                </div>
                <div class="admin__content-component-input-field">
                    <h:selectBooleanCheckbox
                        id="logarithmicScale"
                        value="#{cc.attrs.contentItem.content.logarithmicScale}"
                        onclick="cmsJS.createPage.disablePreview()" />
                </div>
            </div>
        </div>
    </composite:implementation>
</ui:composition>
