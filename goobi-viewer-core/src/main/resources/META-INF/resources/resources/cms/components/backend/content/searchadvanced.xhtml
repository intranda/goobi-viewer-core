<ui:composition
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite">
    <composite:interface>
        <composite:attribute
            name="contentItem"
            required="true" />
    </composite:interface>

    <composite:implementation>
        <div class="admin__content-component-input-group">
            <div class="admin__content-component-input-label">
                <label for="advancedSearchTemplate">#{msg.cms_component__search_advanced__template_select}:</label>
            </div>
            <div class="admin__content-component-input-field">
                <div class="custom-control custom-control--select">
                    <h:selectOneMenu
                        id="advancedSearchTemplate"
                        styleClass="form-control"
                        value="#{cc.attrs.contentItem.content.templateName}">
                        <f:selectItems
                            value="#{configurationBean.advancedSearchTemplateNames}"
                            var="template"
                            itemValue="#{template}"
                            itemLabel="#{msg[template]}" />
                        <f:passThroughAttribute
                            name="aria-label"
                            value="#{msg.cms_component__search_advanced__template_select}" />
                    </h:selectOneMenu>
                </div>
            </div>
        </div>
        <ui:fragment rendered="#{configurationBean.searchResultGroupsEnabled}">
            <div class="admin__content-component-input-group">
                <div class="admin__content-component-input-label">
                    <label for="advancedSearchResultGroup">#{msg.cms_component__search_advanced__result_group_select}:</label>
                </div>
                <div class="admin__content-component-input-field">
                    <div class="custom-control custom-control--select">
                        <h:selectOneMenu
                            id="advancedSearchResultGroup"
                            styleClass="form-control"
                            value="#{cc.attrs.contentItem.content.resultGroupName}">
                            <f:selectItem
                                itemLabel="#{msg.cms_component__search_advanced__result_group_all}"
                                itemValue=""
                                noSelectionOption="true" />
                            <f:selectItems
                                value="#{configurationBean.searchResultGroupNames}"
                                var="groupName"
                                itemValue="#{groupName}"
                                itemLabel="#{msg[groupName]}" />
                            <f:passThroughAttribute
                                name="aria-label"
                                value="#{msg.cms_component__search_advanced__result_group_select}" />
                        </h:selectOneMenu>
                    </div>
                </div>
            </div>
        </ui:fragment>
    </composite:implementation>
</ui:composition>
