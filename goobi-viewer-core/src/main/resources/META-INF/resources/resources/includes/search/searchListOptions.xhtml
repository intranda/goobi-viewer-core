<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:util="http://goobi.io/util"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
    xmlns:widgetComponent="http://xmlns.jcp.org/jsf/composite/components/widgets">
    <ui:param
        name="search"
        value="#{searchParam != null ? searchParam : searchBean}" />

    <!-- SEARCH LIST OPTIONS -->
    <div class="search-list__options-container">
        <ui:fragment rendered="#{navigationHelper.currentPage == 'search' || navigationHelper.currentPage == 'searchlist'}">
            <h1 class="search-list__options-container-heading">#{msg.search}</h1>
        </ui:fragment>

        <div class="search-list__options">
            <!-- HITCOUNT -->
            <div class="search-list__hitcount">
                <h:outputText
                    rendered="#{search.hitsCount > 0}"
                    value="#{msg.hits}: #{search.hitsCount}" />
                <h:outputText
                    rendered="#{search.hitsCount == 0}"
                    value="#{msg.hitsZero}." />
            </div>

            <!-- RSS LINK -->
            <ui:fragment rendered="#{configurationBean.displaySearchRssLinks}">
                <div class="search-list__rss">
                    <a
                        href="#{searchBean.rssUrl}"
                        class="btn btn--icon search-list__option-button"
                        data-toggle="tooltip"
                        data-placement="top"
                        title="#{msg.rssSubscribe}"
                        target="_blank"
                        aria-label="#{msg.rssSubscribe}">
                        <util:icon
                            icon="rss"
                            svgClass="icon" />
                    </a>
                </div>
            </ui:fragment>

            <!-- SAVE SEARCH -->
            <ui:fragment rendered="#{userBean.loggedIn and searchBean.searchSavingEnabled and !searchBean.currentSearch.saved}">
                <viewerComponent:searchSaveDialog prependId="false" />
            </ui:fragment>

            <!-- SEARCH EXPORT (EXCEL) -->
            <ui:fragment rendered="#{configurationBean.searchExcelExportEnabled}">
                <div class="search-list__excel-export">
                    <h:form
                        id="slExportSearchForm"
                        prependId="false">
                        <h:commandLink
                            id="excelDownloadButton"
                            styleClass="btn btn--icon search-list__option-button excel-export-trigger"
                            action="#{searchBean.exportSearchAsExcelAction()}"
                            title="#{msg.searchExportExcel}">
                            <util:icon
                                icon="table-down"
                                svgClass="icon" />
                            <f:passThroughAttribute
                                name="data-toggle"
                                value="tooltip" />
                            <f:passThroughAttribute
                                name="data-placement"
                                value="top" />
                            <f:passThroughAttribute
                                name="aria-label"
                                value="#{msg.searchExportExcel}" />
                        </h:commandLink>

                        <span class="excel-export-loader">
                            #{msg.searchExportExcelLoading}
                            <img
                                src="#{request.contextPath}/resources/images/ajax_preloader.gif"
                                alt="Excel Export Loader" />
                        </span>
                    </h:form>
                </div>
            </ui:fragment>

            <!-- EXPORT OPTIONS DROPDOWN -->
            <div class="dropdown search-list__export-dropdown-wrapper">
                <button
                    class="btn btn--clean dropdown-toggle search-list__option-button search-list__export-dropdown-toggle"
                    type="button"
                    data-toggle="dropdown"
                    aria-expanded="false"
                    title="#{msg.search_export__list_export_action_tooltip}">
                    <util:icon
                        icon="file-export"
                        svgClass="icon" />
                </button>

                <div class="dropdown-menu search-list__export-dropdown">
                    <!-- SEARCH EXPORT (XSLT formats: RIS, Endnote, BibTeX, …) -->
                    <h6 class="search-list__export-dropdown-heading">#{msg.search_export__list_dropdown_heading}</h6>
                    <ui:repeat
                        value="#{configurationBean.enabledSearchExportFormats}"
                        var="exportFormat">
                        <h:outputLink
                            value="#{request.contextPath}/api/v1/search/export/#{exportFormat.name}"
                            styleClass="dropdown-item search-list__export-dropdown-link"
                            title="#{msg['search_export_'.concat(exportFormat.name)]}">
                            <f:param
                                name="query"
                                value="#{search.searchString}" />
                            <f:param
                                name="activeFacetString"
                                value="#{search.facets.activeFacetString}" />
                            <f:param
                                name="sortString"
                                value="#{search.sortString}" />
                            <!-- 	                        <f:passThroughAttribute name="data-toggle" value="tooltip" /> -->
                            <!-- 	                        <f:passThroughAttribute name="data-placement" value="top" /> -->
                            <f:passThroughAttribute
                                name="aria-label"
                                value="#{msg['search_export_'.concat(exportFormat.name)]}" />
                            <span>#{msg['search_export__'.concat(exportFormat.name)]}</span>
                        </h:outputLink>
                    </ui:repeat>
                </div>
            </div>

            <!-- SEARCHLIST VIEWS -->
            <div class="search-list__views">
                <button
                    type="button"
                    class="btn btn--icon search-list__option-button"
                    title="#{msg.searchListDetailView}"
                    data-view="search-list-default"
                    data-toggle="tooltip"
                    data-placement="top"
                    data-trigger="hover"
                    aria-label="#{msg.searchListDetailView}">
                    <util:icon
                        icon="list"
                        svgClass="icon" />
                </button>
                <button
                    type="button"
                    class="btn btn--icon search-list__option-button"
                    title="#{msg.searchListTileView}"
                    data-view="search-list-grid"
                    data-toggle="tooltip"
                    data-placement="top"
                    data-trigger="hover"
                    aria-label="#{msg.searchListTileView}">
                    <util:icon
                        icon="layout-grid"
                        svgClass="icon" />
                </button>
                <button
                    type="button"
                    class="btn btn--icon search-list__option-button"
                    title="#{msg.searchListListView}"
                    data-view="search-list-list"
                    data-toggle="tooltip"
                    data-placement="top"
                    data-trigger="hover"
                    aria-label="#{msg.searchListListView}">
                    <util:icon
                        icon="baseline-density-medium"
                        svgClass="icon" />
                </button>
            </div>

            <ui:fragment rendered="#{searchType != 1}">
                <div class="search-list__help">
                    <button
                        type="button"
                        class="btn btn--icon search-list__option-button"
                        data-toggle="modal"
                        data-target="#searchHelpModal"
                        data-backdrop="false"
                        aria-label="#{msg.search_helpModalTitle}">
                        <span
                            data-toggle="tooltip"
                            data-trigger="hover"
                            title="#{msg.search_options__tooltip_help}">
                            <util:icon
                                icon="help"
                                svgClass="icon" />
                        </span>
                    </button>
                </div>
            </ui:fragment>
        </div>
    </div>

    <!-- CLEAR PULL-RIGHT -->
    <div class="clearfix" />
</ui:composition>
