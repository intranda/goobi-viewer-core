<ui:component
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:c="http://java.sun.com/jsp/jstl/core">
    <c:set
        var="variant"
        value="#{filled == 'true' ? 'filled' : 'outline'}" />
    <ui:param
        name="contextPath"
        value="#{facesContext.externalContext.requestContextPath}" />
    <ui:param
        name="iconPath"
        value="#{contextPath}/resources/icons/#{variant}/#{icon}.svg#icon" />
    <ui:param
        name="wrapperClass"
        value="icon-wrapper#{not empty styleClass ? ' '.concat(styleClass) : ''}" />

    <h:panelGroup
        styleClass="#{wrapperClass}">
        <f:passThroughAttribute name="aria-hidden" value="#{empty ariaLabel ? 'true' : null}" />
        <f:passThroughAttribute name="role"        value="#{not empty ariaLabel ? 'img' : null}" />
        <f:passThroughAttribute name="aria-label"  value="#{not empty ariaLabel ? ariaLabel : null}" />
        <svg 
            class="icon-svg #{svgClass}"
            aria-hidden="true"
            focusable="false">
            <use href="#{iconPath}" />
        </svg>
    </h:panelGroup>
</ui:component>
