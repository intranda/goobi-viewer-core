<ui:component
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:c="http://java.sun.com/jsp/jstl/core">
    <c:set var="_iconVariant"      value="${filled == 'true' ? 'filled' : 'outline'}" />
    <c:set var="_iconPath"         value="${facesContext.externalContext.requestContextPath}/resources/icons/${_iconVariant}/${icon}.svg#icon" />
    <c:set var="_iconWrapperClass" value="${not empty styleClass ? 'icon-wrapper '.concat(styleClass) : 'icon-wrapper'}" />
    <c:set var="_iconSvgClass"     value="${not empty svgClass   ? 'icon-svg '.concat(svgClass)       : 'icon-svg'}" />

    <h:panelGroup styleClass="#{_iconWrapperClass}">
        <f:passThroughAttribute
            name="aria-hidden"
            value="#{empty ariaLabel ? 'true' : null}" />
        <f:passThroughAttribute
            name="role"
            value="#{not empty ariaLabel ? 'img' : null}" />
        <f:passThroughAttribute
            name="aria-label"
            value="#{not empty ariaLabel ? ariaLabel : null}" />
        <svg
            class="#{_iconSvgClass}"
            aria-hidden="true"
            focusable="false">
            <use href="#{_iconPath}" />
        </svg>
    </h:panelGroup>
    <c:set var="styleClass" value="" />
    <c:set var="svgClass"   value="" />
    <c:set var="filled"     value="" />
    <c:set var="ariaLabel"  value="" />
</ui:component>
