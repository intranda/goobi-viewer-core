<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:util="http://goobi.io/util"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:fn="http://java.sun.com/jsp/jstl/functions"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">
    <div class="toc__mv-tile-grid">
        <ui:repeat
            var="tocElement"
            value="#{activeDocumentBean.toc.flatView}">
            <h:panelGroup rendered="#{tocElement.pageNo == null}">
                <h2 class="toc__mv-tile-grid-heading">#{tocElement.label}</h2>
            </h:panelGroup>

            <ui:fragment rendered="#{tocElement.pageNo != null}">
                <a
                    href="#{tocElement.url}"
                    class="toc__mv-tile">
                    <ui:fragment rendered="#{tocElement.thumbnailUrl != null}">
                        <div class="toc__mv-tile-image-wrapper">
                            <img
                                src="#{tocElement.getThumbnailUrl(450, 450)}"
                                class="toc__mv-tile-image"
                                alt=""
                                data-viewer-thumbnail="thumbnail"
                                data-viewer-access-denied-url="#{tocElement.getAccessDeniedThumbnailUrl(navigationHelper.locale)}" />
                        </div>
                    </ui:fragment>

                    <div class="toc__mv-tile-title-wrapper">
                        <span class="toc__mv-tile-title">#{tocElement.label}</span>
                    </div>
                </a>
            </ui:fragment>
        </ui:repeat>
    </div>
</ui:composition>
