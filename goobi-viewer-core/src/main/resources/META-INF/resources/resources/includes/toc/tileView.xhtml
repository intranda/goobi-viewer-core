
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:util="http://goobi.io/util"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:fn="http://java.sun.com/jsp/jstl/functions"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
	xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">


	<div class="toc__mv-tile-grid test">

		<ui:repeat var="tocElement" value="#{activeDocumentBean.toc.flatView}">

			<h:panelGroup rendered="#{tocElement.pageNo == null}">
				<h4>#{tocElement.label}</h4>
			</h:panelGroup>

			<a href="#{tocElement.url}" class="toc__mv-tile">
				<ui:fragment rendered="#{tocElement.thumbnailUrl != null}">
					<img src="#{tocElement.thumbnailUrl}" class="toc__mv-tile-image"
						alt="" data-viewer-thumbnail="thumbnail"
						data-viewer-access-denied-url="#{tocElement.getAccessDeniedThumbnailUrl(navigationHelper.locale)}" />
				</ui:fragment>
				<div class="toc__mv-tile-title-wrapper">
					<h2>#{tocElement.label}</h2>
				</div> 
			</a>

		</ui:repeat>


	</div>

</ui:composition>
