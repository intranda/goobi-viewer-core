<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:util="http://goobi.io/util"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:fn="http://java.sun.com/jsp/jstl/functions"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">
    <!-- EXPANDABLE TREEVIEW -->
    <h:panelGroup
        rendered="#{configurationBean.isTocTreeView(activeDocumentBean.viewManager.topStructElement.docStructType)}">
        <div id="expandableToc">
            <!-- EXPAND ALL -->
            <div class="toc__list-expandable-all">
                <button
                    type="button"
                    class="btn btn--clean"
                    data-action="collapse-all"
                    title="#{msg.allClose}"
                    data-toggle="tooltip"
                    data-placement="top"
                    aria-label="#{msg.allClose}">
                    <util:icon icon="square-rounded-minus" />
                </button>
                <button
                    type="button"
                    class="btn btn--clean"
                    data-action="expand-all"
                    title="#{msg.allOpen}"
                    data-toggle="tooltip"
                    data-placement="top"
                    aria-label="#{msg.allOpen}">
                    <util:icon icon="square-rounded-plus" />
                </button>
            </div>

            <nav class="toc__list-expandable">
                <ul class="toc__list-outer-list">
                    <ui:repeat
                        var="tocElement"
                        value="#{activeDocumentBean.toc.treeView}">
                        <li
                            class="toc__list-expandable-elem #{tocElement.hasChild == true ? 'parent' : 'child' } #{!tocElement.visible ? 'toc__list-expandable-elem--hidden' : ''} #{tocElement.expanded ? 'toc__list-expandable-elem--expanded' : ''}"
                            data-iddoc="iddoc_#{tocElement.iddoc}"
                            data-level="#{tocElement.level}"
                            style="padding-left: #{tocElement.level * indent}px">
                            <div class="row">
                                <div class="col-12 col-sm-1">
                                    <ui:fragment rendered="#{tocElement.hasChild}">
                                        <!-- EXPAND -->
                                        <div class="toc__list-expandable-expand">
                                            <button
                                                type="button"
                                                class="btn btn--clean toc__list-expandable-toggle"
                                                aria-expanded="#{tocElement.expanded}"
                                                aria-label="#{tocElement.expanded ? msg.allClose : msg.allOpen}">
                                                <util:icon
                                                    icon="square-rounded-plus"
                                                    svgClass="icon toc__icon-expand" />
                                                <util:icon
                                                    icon="square-rounded-minus"
                                                    svgClass="icon toc__icon-collapse" />
                                            </button>
                                        </div>
                                    </ui:fragment>
                                </div>
                                <div class="col-12 col-sm-8 col-md-9 toc__list-expandable-title-wrapper">
                                    <!-- TITLE -->
                                    <div class="toc__list-expandable-title">
                                        <h:outputLink
                                            rendered="#{tocElement.pageNo == null}"
                                            title="#{tocElement.label}"
                                            value="#{tocElement.url}">
                                            #{tocElement.label}
                                        </h:outputLink>
                                        <h:outputLink
                                            rendered="#{tocElement.pageNo != null}"
                                            title="#{tocElement.label}"
                                            value="#{tocElement.url}">
                                            #{tocElement.label}
                                        </h:outputLink>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-3 col-md-2">
                                    <!-- NUMBER -->
                                    <div class="toc__list-expandable-number">
                                        <h:panelGroup rendered="#{tocElement.label != null}">
                                            <a
                                                href="#{tocElement.url}"
                                                title="#{tocElement.label}"
                                                aria-label="#{tocElement.label}">
                                                #{tocElement.pageNoLabel}
                                            </a>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{tocElement.pageNo == null}">
                                            <span>#{tocElement.pageNoLabel}</span>
                                        </h:panelGroup>

                                        <!-- PDF DOWNLOAD -->
                                        <h:panelGroup
                                            rendered="#{activeDocumentBean.viewManager.externalDownloadUrl == null and
																	                          tocElement.pageNo != null and tocElement.accessPermissionPdf}">
                                            <h:panelGroup rendered="#{!configurationBean.generatePdfInMessageQueue}">
                                                <a
                                                    href="#{tocElement.contentServerPdfUrl}"
                                                    title="#{msg.label__pdf_download}">
                                                    <util:icon icon="file-type-pdf" />
                                                </a>
                                            </h:panelGroup>
                                            <h:panelGroup rendered="#{configurationBean.generatePdfInMessageQueue}">
                                                <button
                                                    class="btn btn--clean toc__list-expandable-download-button"
                                                    aria-label="#{msg.label__pdf_download}"
                                                    jsf:action="#{viewBean.put('title', tocElement.label).put('logId', tocElement.logId).put('fileSize', activeDocumentBean.getPdfSize(tocElement.logId))}">
                                                    <util:icon icon="file-type-pdf" />
                                                    <f:ajax
                                                        render="modalDownloadWrapper"
                                                        onevent="data => {if(data.status == 'success') $('#downloadModal').modal()}" />
                                                </button>
                                            </h:panelGroup>
                                        </h:panelGroup>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ui:repeat>
                </ul>
            </nav>
        </div>

        <script type="text/javascript">viewerJS.expandableToc.init();</script>
    </h:panelGroup>
</ui:composition>
