<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">
    <ui:param
        name="showDetails"
        value="#{configurationBean.isSidebarWidgetForViewShowDetails(navigationHelper.currentView, 'related-groups')}" />
    <ui:fragment
        rendered="#{showDetails and not empty activeDocumentBean.groupMembershipDetailsForSection and (activeDocumentBean.viewManager.topStructElement.groupMember or activeDocumentBean.viewManager.topStructElement.anchorChild)}">
        <ui:param
            name="anchorReady"
            value="#{activeDocumentBean.viewManager.topStructElement.anchorChild and not empty activeDocumentBean.viewManager.anchorPi and not empty activeDocumentBean.viewManager.anchorStructElement}" />
        <div class="related-groups-section">
            <!-- Heading: "Diese Publikation ist Teil des Gesamtwerks [Anchor Name]" - requires full anchor info -->
            <h:panelGroup rendered="#{anchorReady}">
                <h2 class="related-groups-section__heading">
                    <span>#{msg.recordGroupMemberships_partOf} #{activeDocumentBean.viewManager.anchorStructElement.label}</span>
                </h2>
            </h:panelGroup>

            <!-- Fallback heading: anchor info incomplete OR plain group membership -->
            <h:panelGroup rendered="#{!anchorReady}">
                <h2 class="related-groups-section__heading">#{msg.recordGroupMemberships}</h2>
            </h:panelGroup>

            <!-- Card grid -->
            <div class="related-groups-section__grid">
                <ui:repeat
                    var="detail"
                    value="#{activeDocumentBean.groupMembershipDetailsForSection}">
                    <a
                        href="#{navigationHelper.imageUrl}/#{detail.pi}/1/"
                        class="related-groups-section__card">
                        <div class="related-groups-section__card-image">
                            <h:panelGroup rendered="#{not empty detail.thumbnailUrl}">
                                <img
                                    src="#{detail.thumbnailUrl}"
                                    alt="#{detail.title}"
                                    data-viewer-thumbnail="thumbnail" />
                            </h:panelGroup>
                            <h:panelGroup rendered="#{empty detail.thumbnailUrl}">
                                <img
                                    src="#{request.contextPath}/resources/themes/#{navigationHelper.theme}/images/image_not_found.png"
                                    alt="#{detail.title}" />
                            </h:panelGroup>
                        </div>
                        <div class="related-groups-section__card-info">
                            <span class="related-groups-section__card-title">#{detail.title}</span>
                            <h:panelGroup rendered="#{not empty detail.yearPublish}">
                                <span class="related-groups-section__card-year">(#{detail.yearPublish})</span>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{not empty detail.subtitle}">
                                <span class="related-groups-section__card-creator">#{detail.subtitle}</span>
                            </h:panelGroup>
                        </div>
                    </a>
                </ui:repeat>

                <!-- "Zum Gesamtwerk" button - only when full anchor info is available -->
                <h:panelGroup rendered="#{anchorReady}" styleClass="related-groups-section__view-all-wrapper" layout="block">
                    <a
                        href="#{navigationHelper.getRecordUrl(activeDocumentBean.viewManager.anchorPi, activeDocumentBean.viewManager.anchorStructElement.docStructType, 1, true, false)}"
                        class="related-groups-section__view-all">
                        <span class="related-groups-section__view-all-icon">→</span>
                        <span class="related-groups-section__view-all-label">#{msg.recordGroupMemberships_viewAll}</span>
                    </a>
                </h:panelGroup>
            </div>
        </div>
    </ui:fragment>
</ui:composition>
