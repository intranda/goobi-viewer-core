<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components">
    <ui:fragment rendered="#{activeDocumentBean.viewManager.topStructElement.groupMember or activeDocumentBean.viewManager.topStructElement.anchorChild}">
        <div class="related-groups-section">
            <!-- Heading: "Diese Publikation ist Teil des Gesamtwerks [Anchor Name]" -->
            <h:panelGroup rendered="#{activeDocumentBean.viewManager.topStructElement.anchorChild}">
                <h2 class="related-groups-section__heading">
                    #{msg.recordGroupMemberships_partOf}
                    <a
                        href="#{navigationHelper.getRecordUrl(activeDocumentBean.viewManager.anchorPi, activeDocumentBean.viewManager.anchorStructElement.docStructType, 1, true, false)}"
                        class="related-groups-section__heading-link">
                        #{activeDocumentBean.viewManager.anchorStructElement.label}
                    </a>
                </h2>
            </h:panelGroup>

            <h:panelGroup rendered="#{!activeDocumentBean.viewManager.topStructElement.anchorChild and activeDocumentBean.viewManager.topStructElement.groupMember}">
                <h2 class="related-groups-section__heading">#{msg.recordGroupMemberships}</h2>
            </h:panelGroup>

            <!-- Card grid -->
            <div class="related-groups-section__grid">
                <ui:repeat
                    var="detail"
                    value="#{activeDocumentBean.groupMembershipDetails}">
                    <a
                        href="#{navigationHelper.tocUrl}/#{detail.pi}/1/"
                        class="related-groups-section__card">
                        <div class="related-groups-section__card-image">
                            <img
                                src="#{detail.thumbnailUrl}"
                                alt="#{detail.title}"
                                data-viewer-thumbnail="thumbnail" />
                        </div>
                        <div class="related-groups-section__card-info">
                            <span class="related-groups-section__card-title">#{detail.title}</span>
                            <h:panelGroup rendered="#{not empty detail.creator}">
                                <span class="related-groups-section__card-creator">#{detail.creator}</span>
                            </h:panelGroup>
                        </div>
                    </a>
                </ui:repeat>

                <!-- "Zum Gesamtwerk" button -->
                <h:panelGroup rendered="#{activeDocumentBean.viewManager.topStructElement.anchorChild}">
                    <a
                        href="#{navigationHelper.getRecordUrl(activeDocumentBean.viewManager.anchorPi, activeDocumentBean.viewManager.anchorStructElement.docStructType, 1, true, false)}"
                        class="related-groups-section__view-all">
                        <span class="related-groups-section__view-all-icon">→</span>
                        <span class="related-groups-section__view-all-label">#{msg.recordGroupMemberships_viewAll}</span>
                    </a>
                </h:panelGroup>
            </div>
        </div>
    </ui:fragment>
</ui:composition>
