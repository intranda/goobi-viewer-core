<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:fn="http://java.sun.com/jsp/jstl/functions"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
    xmlns:util="http://goobi.io/util"
    xmlns:widgetComponent="http://xmlns.jcp.org/jsf/composite/components/widgets">
    <ui:param
        name="search"
        value="#{searchParam != null ? searchParam : searchBean}" />
    <ui:param
        name="title"
        value="#{title != null ? title : ''}" />
    <ui:param
        name="renderOnSearchTypeChange"
        value="#{renderOnSearchTypeChange != null ? renderOnSearchTypeChange : ''}" />
    <ui:param
        name="searchPlaceholder"
        value="#{cmsPlaceholder != null and cmsPlaceholder != '' ? cmsPlaceholder : msg.search}" />
    <ui:param
        name="quickFiltersInitOpen"
        value="#{quickFiltersInitOpen != null ? quickFiltersInitOpen : false}" />
    <ui:param
        name="quickFiltersEnabled"
        value="#{quickFiltersEnabled != null ? quickFiltersEnabled : false}" />

    <!-- SEARCH STANDARD -->
    <div class="search-standard">
        <!-- SEARCH STANDRAD TITLE -->

        <h:form
            id="searchForm"
            prependId="true"
            styleClass="search-standard__form#{quickFiltersEnabled ? ' -with-filters' : ''}">
            <!-- SEARCH STANDARD INPUT -->
            <div class="search-standard__input-slim#{quickFiltersEnabled ? ' -with-filters' : ''}">
                <!-- ONLY RENDER DROPDOWN IF THERE IS AN OPTION TO CHOOSE -->
                <ui:fragment rendered="#{fn:length(search.searchFilters) gt 1 and !quickFiltersEnabled}">
                    <div class="search-standard__filter-select">
                        <h:inputHidden
                            id="hiddenSearchFilterString"
                            value="#{search.currentSearchFilterString}"
                            pt:data-value="hiddenSearchFilterString" />

                        <div class="custom-control custom-control--select">
                            <select aria-label="#{msg.limitSearch}">
                                <ui:repeat
                                    var="filter"
                                    value="#{search.searchFilters}">
                                    <option
                                        id="#{filter.label}"
                                        name="searchStandardFilter"
                                        pt:name="searchStandardFilter"
                                        value="#{filter.label}"
                                        selected="#{filter.label eq search.currentSearchFilterString ? 'true' : null}">
                                        #{msg[filter.label]}
                                    </option>
                                </ui:repeat>
                            </select>
                        </div>

                        <script>
                            $('.search-standard__filter-select select').on('change', function () {
                                var currOptionSelected = $('option:selected', this);
                                var currValue = currOptionSelected.val();
                                let $input = $("[data-value='hiddenSearchFilterString']");
                                //console.log("changed search filter to ", currValue, $input);
                                $input.val(currValue).change();
                            });
                        </script>
                    </div>
                </ui:fragment>

                <div class="search-standard__input-autocomplete">
                    <viewerComponent:autocomplete
                        value="#{search.searchString}"
                        items="#{search.autocomplete}"
                        placeholder="#{searchPlaceholder}" />
                    <ui:fragment rendered="#{quickFiltersEnabled}">
                        <button
                            type="button"
                            class="search-standard__filter-toggle"
                            data-quickfilter-toggle="true"
                            aria-expanded="false"
                            aria-controls="quickFiltersPanel"
                            aria-label="#{msg['search__quick_filter__toggle']}">
                            <span class="search-standard__filter-toggle-icon -open">
                                <util:icon icon="adjustments-horizontal" />
                            </span>
                            <span
                                class="search-standard__filter-toggle-icon -close"
                                style="display:none;">
                                <util:icon icon="adjustments-off" />
                            </span>
                        </button>
                    </ui:fragment>
                </div>
                <h:commandButton
                    id="submitSearch"
                    type="submit"
                    styleClass="btn btn--full search-standard__submit-button"
                    action="#{search.searchSimple}"
                    value="#{msg.search}">
                    <f:setPropertyActionListener
                        target="#{search.activeSearchType}"
                        value="0" />
                </h:commandButton>
            </div>
            <ui:fragment rendered="#{quickFiltersEnabled}">
                <ui:include src="/resources/includes/search/searchQuickFilters.xhtml" />
            </ui:fragment>
        </h:form>
        <ui:fragment rendered="#{quickFiltersEnabled}">
            <div
                class="search-quick-filters__status-bar -outer"
                data-quickfilter-status="true"
                data-quickfilter-status-label-singular="#{msg['search__quick_filter__active_filter_singular']}"
                data-quickfilter-status-label-plural="#{msg['search__quick_filter__active_filter_plural']}"
                style="display:none;">
                <div
                    class="search-quick-filters__status-info"
                    data-quickfilter-status-tooltip="true"
                    tabindex="0">
                    <util:icon icon="adjustments-horizontal" />
                    <span data-quickfilter-status-text="true" />
                </div>
                <a
                    href="#"
                    class="search-quick-filters__status-reset"
                    data-quickfilter-status-reset="true">
                    <util:icon icon="x" />
                    #{msg['search__quick_filter__reset']}
                </a>
            </div>
        </ui:fragment>
    </div>

    <ui:fragment rendered="#{quickFiltersEnabled}">
        <h:outputScript>
            $(document).ready(function() {
                if (viewerJS.searchQuickfilters) {
                    viewerJS.searchQuickfilters.init();
                }
            });
        </h:outputScript>
        <c:if test="#{quickFiltersInitOpen}">
            <h:outputScript>
                $(document).ready(function() {
                    if (viewerJS.searchQuickfilters) {
                        viewerJS.searchQuickfilters.open();
                    }
                });
            </h:outputScript>
        </c:if>
    </ui:fragment>

    <!-- SEARCH HELP MODAL -->
    <div
        class="modal fade search-help"
        id="searchHelpModal"
        tabindex="-1"
        role="dialog"
        aria-labelledby="searchHelpModalLabel">
        <div
            class="modal-dialog"
            role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h2
                        class="modal-title"
                        id="searchHelpModalLabel">
                        #{msg.search_helpModalTitle}
                    </h2>
                    <button
                        type="button"
                        class="fancy-close"
                        data-dismiss="modal"
                        aria-label="Close">
                        <span aria-hidden="true">
                            <h:outputText
                                value="&amp;times;"
                                escape="false" />
                        </span>
                    </button>
                </div>
                <div class="modal-body">
                    <viewerComponent:searchHelpText />
                </div>
                <div class="modal-footer">
                    <button
                        type="button"
                        class="btn btn--full"
                        data-dismiss="modal">
                        #{msg.search_helpModalClose}
                    </button>
                </div>
            </div>
        </div>
        <div
            class="alt-backdrop"
            data-dismiss="modal" />
    </div>
</ui:composition>
