<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml" 
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:h="http://xmlns.jcp.org/jsf/html" 
    xmlns:f="http://xmlns.jcp.org/jsf/core" 
    xmlns:jsf="http://xmlns.jcp.org/jsf" 
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:facelet="http://goobi.io/facelets"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner" 
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
    xmlns:widgetComponent="http://xmlns.jcp.org/jsf/composite/components/widgets">

    <!-- IMAGE CONTAINER -->
    
    <style>
    
    #preloader {
    	display: flex;
    	width: 100%;
    	height: 100%;
    	justify-content: center;
 		align-items: center;
  		flex-direction: column;
    }
    #world canvas {
    	display: none;
    }
    #world #loadingProgress {
     	display: none; 
    }    
    #world #objectLoader {
     	display: none; 
    }  
    </style>
    
    <link href="#{request.contextPath}/resources/javascript/libs/voyager/css/voyager-story.min.css" rel="stylesheet"></link>
    <script defer="defer" src="#{request.contextPath}/resources/javascript/libs/voyager/js/voyager-story.min.js"></script>
    <script defer="defer" src="#{request.contextPath}/resources/javascript/libs/voyager/js/voyager-explorer.min.js"></script>
    
    <button jsf:id="loadStoryEditor" rendered="#{userBean.admin}" onclick="loadStory()">#{msg.voyager__open_editor}</button>
    <button jsf:id="closeStoryEditor" rendered="#{userBean.admin}" style="display:none;" onclick="loadObject()">#{msg.voyager__close_editor}</button>
    
    <div id="objectContainer" class="view-object__object-3d">        
        <!-- MAP -->
        <div id="world" class="view-object__object-3d-world" data-allow-download="#{activeDocumentBean.viewManager.currentPage.accessPermissionImageDownload}">
            <div id="preloader">
 
        		<p id="beforeLoad" class="before-load view-object__object-3d-world-before-load-text">
        			<h:outputText value="#{msg.object_3d__before_load}" escape="false" /> 
        		</p>
        		<button id="startLoadButton" class="before-load btn btn--default" onclick="loadObject()">#{msg.show}</button>
		        <progress id="loadingProgress"  max="undefined" value="undefined"></progress>
		        <img id="objectLoader" src="#{request.contextPath}/resources/images/infinity_loader.svg" />

        	</div>
        </div>
        <!-- ACCESS DENIED DESCRIPTION TEXT -->
        <h:panelGroup styleClass="view-object__access-denied-text"
            rendered="#{!activeDocumentBean.viewManager.currentPage.accessPermissionObject and activeDocumentBean.viewManager.currentPage.getAccessDeniedDescriptionTextForImage(navigationHelper.locale) != null}">
            <h:outputText escape="false"
                value="#{activeDocumentBean.viewManager.currentPage.getAccessDeniedDescriptionTextForImage(navigationHelper.locale)}" />
        </h:panelGroup>
    </div>

    <!-- MOBILE IMAGE VIEW -->
        <div id="imageContainerMobile" class="view-object__image-mobile">

        </div>
        
        <script>
        
        const explorer = `<voyager-explorer id='voyager' bgcolor='#015999 #000' bgstyle='LinearGradient' style='display:none;' document='#{activeDocumentBean.viewManager.currentObjectUrl}/scene.svx.json' uiMode='menu' resourceRoot='#{request.contextPath}/resources/javascript/libs/voyager/'></voyager-explorer>`;
    	const world = document.getElementById("world");
        const loadStoryButton = document.getElementById("loadStoryEditor");
        const closeStoryButton = document.getElementById("closeStoryEditor");
    	
       	function loadObject() {
       		console.log("loading object");
       		
       		show(loadStoryButton);
       		hide(closeStoryButton);
       		unloadObject();
       		unloadStory();
       		$("#startLoadButton").hide();
       		$("#loadingProgress").show();
       		
       		
       		const tempElement = document.createElement('div');
       		tempElement.innerHTML = explorer;
       		
       		console.log("appending ", ...tempElement.children,  " to ", world);
       		world.append(...tempElement.children);
       		
       		const voyager = document.getElementById("voyager");
       		voyager.addEventListener("model-load", e => {
    			console.log("loaded ", e); 
    			show(voyager);
    		})
       	}
       	
       	const story = `<voyager-story id='voyagerStory' bgcolor='#015999 #000' bgstyle='LinearGradient' style='display:none;' document='#{activeDocumentBean.viewManager.currentObjectUrl}/scene.svx.json'></voyager-story>`;

       	
       	function loadStory() {
       		console.log("loading story");
       		
       		hide(loadStoryButton);
       		show(closeStoryButton);
       		unloadObject();
       		unloadStory();
       		$("#startLoadButton").hide();
       		$("#loadingProgress").show();
       		
       		const tempElement = document.createElement('div');
       		tempElement.innerHTML = story;
       		
       		console.log("appending ", ...tempElement.children,  " to ", world);
       		world.append(...tempElement.children);
       		
       		const voyager = document.getElementById("voyagerStory");
       		voyager.addEventListener("model-load", e => {
    			console.log("loaded ", e); 
    			show(voyager);
    		})
       		
       	}
       	
       	function hide(element) {
       		if(element) {
       			element.style.display = "none";
       		}
       	}
       	
    	function show(element) {
       		if(element) {
       			element.style.display = "block";
       		}
       	}
       	
       	function unloadObject() {
       		document.getElementById("voyager")?.remove();
       	}
       	
       	function unloadStory() {
       		document.getElementById("voyagerStory")?.remove();
       	}
        
        </script>

</ui:composition>
