<ui:component
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:util="http://goobi.io/util"
    xmlns:c="http://java.sun.com/jsp/jstl/core">
    <c:set
        var="_iconTextWrapperClass"
        value="${not empty styleClass  ? 'icon-text '.concat(styleClass) : 'icon-text'}" />
    <c:set
        var="_iconTextPosition"
        value="${not empty textPosition ? textPosition : 'right'}" />

    <span class="#{_iconTextWrapperClass}">
        <c:choose>
            <c:when test="#{_iconTextPosition eq 'left'}">
                <span class="#{textClass}">#{text}</span>
                <util:icon
                    icon="#{icon}"
                    filled="#{filled}"
                    styleClass="#{iconClass}"
                    svgClass="#{iconSvgClass}" />
            </c:when>
            <c:otherwise>
                <util:icon
                    icon="#{icon}"
                    filled="#{filled}"
                    styleClass="#{iconClass}"
                    svgClass="#{iconSvgClass}" />
                <span class="#{textClass}">#{text}</span>
            </c:otherwise>
        </c:choose>
    </span>
    <c:set
        var="styleClass"
        value="" />
    <c:set
        var="iconClass"
        value="" />
    <c:set
        var="iconSvgClass"
        value="" />
    <c:set
        var="textClass"
        value="" />
    <c:set
        var="textPosition"
        value="" />
    <c:set
        var="filled"
        value="" />
</ui:component>
