<ui:component
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:util="http://goobi.io/util"
    xmlns:c="http://java.sun.com/jsp/jstl/core">
    <c:set var="wrapperClass"   value="${not empty styleClass  ? 'icon-text '.concat(styleClass) : 'icon-text'}" />
    <c:set var="_textPosition" value="${not empty textPosition ? textPosition : 'right'}" />

    <span class="#{wrapperClass}">
        <c:choose>
            <c:when test="#{_textPosition eq 'left'}">
                <span class="#{textClass}">#{text}</span>
                <util:icon
                    icon="#{icon}"
                    filled="#{filled}"
                    styleClass="#{iconClass}"
                    svgClass="#{iconSvgClass}" />
            </c:when>
            <c:otherwise>
                <util:icon
                    icon="#{icon}"
                    filled="#{filled}"
                    styleClass="#{iconClass}"
                    svgClass="#{iconSvgClass}" />
                <span class="#{textClass}">#{text}</span>
            </c:otherwise>
        </c:choose>
    </span>
</ui:component>
