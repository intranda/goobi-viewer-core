<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:util="http://goobi.io/util"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:fn="http://java.sun.com/jsp/jstl/functions"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    template="/resources/themes/#{navigationHelper.theme}/template.html"
    xmlns:viewer="http://xmlns.jcp.org/jsf/composite/components/partner"
    xmlns:viewerComponent="http://xmlns.jcp.org/jsf/composite/components"
    xmlns:widgetComponent="http://xmlns.jcp.org/jsf/composite/components/widgets">

    <ui:define name="metadata">
        <f:metadata>
            <f:event type="preRenderView" listener="#{navigationHelper.setCurrentView('toc')}" />
        </f:metadata>
    </ui:define>

	<ui:define name="head">
		<f:view contentType="text/html" encoding="utf-8">
            <h:outputText escape="false" value="#{activeDocumentBean.viewManager.dublinCoreMetaTags}" />
            <h:outputText escape="false" value="#{activeDocumentBean.viewManager.highwirePressMetaTags}" />
		</f:view>
	</ui:define>

    <ui:define name="breadcrumbs">
        <viewerComponent:breadcrumbs showIcon="false" showStartText="true" />
    </ui:define>

    <ui:define name="content">
		<f:view contentType="text/html" encoding="utf-8">
            <!-- reCAPTCHA API -->
            <h:panelGroup rendered="#{configurationBean.useReCaptcha}">
                <script src="https://www.google.com/recaptcha/api.js" async="async" defer="defer"></script>
            </h:panelGroup>
            
            <!-- TODO: use appropriate class and maybe styling -->
            <div id="AJAXLoader" class="archives-tree__loader"></div>
             
            <!-- No access ticket required or already unlocked -->
            <ui:fragment rendered="#{!activeDocumentBean.viewManager.recordAccessTicketRequired}">

			<div id="viewToc" class="view-toc"> 

		    	<div id="title" class="title">
		    		<!-- TITLE HEADER --> 
					<div class="title__header">
						<h1 class="h2">
		
							<!-- FA* is this still needed? What is the purpose? -->
							<!-- PAGE TYPE -->
							<span class="title__header-page-type">
								<h:outputText value="#{msg[navigationHelper.currentView]}" escape="false" />:
							</span>
		
							<!-- NAME OF THE RECORD -->
							<span class="title__header-label">#{activeDocumentBean.titleBarLabel}</span>
				
						</h1> 
					</div>
				</div>

				<div class="toc">
					<h:form id="tocForm" prependId="false">
						<!-- MULTI VOLUME TOC -->
						<h:panelGroup rendered="#{activeDocumentBean.anchor or activeDocumentBean.group}">
							<div class="toc_metadata">
								<ui:include
									src="/resources/includes/metadata/metadataElement.xhtml">
									<ui:param name="metadataElement"
										value="#{metadataBean.getTopMetadataElement(0)}" />
									<ui:param name="renderTitle" value="false"/>
								</ui:include>
							</div>

							<div class="toc__multi-volume">
								<!-- TILE VIEW -->
								<ui:include src="/resources/includes/toc/tileView.xhtml"></ui:include>

								<!-- GROUPS: DEFAULT AND != DEFAULT -->
								<ui:include src="/resources/includes/toc/groups.xhtml"></ui:include>
							</div>
						</h:panelGroup>


						<!-- TOC TREEVIEW -->
						<h:panelGroup rendered="#{!activeDocumentBean.anchor and !activeDocumentBean.group}">
							<c:set var="indent" value="#{configurationBean.tocIndentation}" scope="request" />
 
								<!-- EXPANDABLE TREEVIEW -->
								<ui:include src="/resources/includes/toc/expandableTreeView.xhtml"></ui:include>

								<!-- FULL TREEVIEW -->
								<ui:include src="/resources/includes/toc/fullTreeView.xhtml"></ui:include>

							</h:panelGroup>

					</h:form>
				</div>
			</div>
			</ui:fragment>
			
			<h:panelGroup id="modalDownloadWrapper">
				<viewerComponent:modalDownload
	              logId="#{viewBean.get('logId')}"
	              title="#{viewBean.get('title')}"
	              fileSize="#{viewBean.get('fileSize')}"
	            />
			</h:panelGroup>
			
            <!-- Access ticket required -->
            <ui:fragment rendered="#{activeDocumentBean.viewManager.recordAccessTicketRequired}">
            	<div class="access-ticket-info">
            		<div class="access-ticket-info__inner">
            			<h1><span class="access-ticket-info__object-title">#{activeDocumentBean.titleBarLabel}</span></h1>
		                <p>#{msg.access_tickets__record_access_ticket_required}</p>
		                <button class="btn btn--full" data-toggle="modal"
		                    data-target="#accessTicketModal">#{msg.action__born_digital__unlock}</button>
		                <viewerComponent:modalAccessTicket />
	                </div>
                </div>
            </ui:fragment>

            <h:panelGroup rendered="#{userBean.loggedIn}">
                <input id="userEmail" type="hidden" value="#{userBean.user.email}" />
            </h:panelGroup>

            <script type="text/javascript">
                $( '[data-toggle="mv-element"]' ).on( "click", function() {
                    var currBtn = $( this );

                    currBtn.toggleClass( "active" );
                    currBtn.parents().next( ".toc__mv-element" ).slideToggle( {
                        duration: 0,
                        start: function() {
                            currBtn.prev().toggleClass( "inactive" );
                        }
                    } );
                } );

                 $( '[data-iddoc*="iddoc"] a' ).on( "click", function( event ) {
                     event.preventDefault();

                     var currIdDoc = $( this ).parents( "li" ).attr( "data-iddoc" );
                     var currUrl = $( this ).attr( "href" );

                     sessionStorage.setItem( "currIdDoc", currIdDoc );
                     location.href = currUrl;
                 } );


                var normdataConfig = {
                    path: "#{request.contextPath}",
                    lang: {
                        popoverTitle: "#{msg.normdataPopoverTitle}",
                        popoverClose: "#{msg.normdataPopoverClose}",
                        showNormdata: "#{msg.normdataExpand}"
                    },
                    elemWrapper: $( "#metadataElementWrapper" )
                };

                viewerJS.normdata.init( normdataConfig );
                
                
            </script>
		</f:view>
	</ui:define>

	<ui:define name="sidebar">
		<!-- HIDE SIDEBAR IF ACCESS TICKET REQUIRED FOR OBJECT -->
		<ui:fragment
			rendered="#{!activeDocumentBean.viewManager.recordAccessTicketRequired}">
			<viewerComponent:record_sidebar id="sidebar" />
		</ui:fragment>
	</ui:define>

</ui:composition>
