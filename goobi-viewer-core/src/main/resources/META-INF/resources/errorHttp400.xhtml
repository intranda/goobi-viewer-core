<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    template="/resources/themes/#{navigationHelper.theme}/templateBlank.html">
    <ui:define name="metadata">
        <f:metadata>
            <f:event
                type="preRenderView"
                listener="#{navigationHelper.setCurrentPage('errorHttp400')}" />
        </f:metadata>
    </ui:define>

    <ui:define name="content">
        <f:view
            contentType="text/html"
            encoding="utf-8">
            <div class="view-error-page">
                <div
                    id="errorHttp400"
                    class="view-error">
                    <div class="view-error__icon">
                        <h:graphicImage
                            library="resources"
                            name="images/goobi-error.gif"
                            styleClass="view-error__image"
                            alt="Goobi Error" />
                    </div>
                    <div class="view-error__headline">
                        <span class="view-error__code">400.</span>
                        <h:outputText value=" " />
                        <span class="view-error__title"><h:outputText value="#{msg.errHttp400Title}" /></span>
                    </div>
                    <div class="view-error__message">
                        <h:outputText
                            value="#{msg.errHttp400Msg}"
                            escape="false" />
                    </div>
                    <div class="view-error__actions">
                        <h:outputLink
                            value="#{navigationHelper.applicationUrl}"
                            styleClass="btn btn--full">
                            <h:outputText value="#{msg.returnHome}" />
                        </h:outputLink>
                        <a
                            href="javascript:location.reload();"
                            class="btn btn--default">
                            <h:outputText value="#{msg.errHttpRetry}" />
                        </a>
                    </div>
                </div>
            </div>
        </f:view>
    </ui:define>
</ui:composition>
