name: Create Release

on:
  push:
    tags:
      - v*

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Create viewer.war
        run: mvn -f pom.xml clean package -U -B
      - name: Create config.tar.gz
        run: |
          cp -r goobi-viewer-config/install config
          tar -czf config.tar.gz config
      - name: Create a Github release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload viewer.war to Github Release
        uses: actions/upload-release-asset@v1.0.1
        id: upload-release-asset 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./goobi-viewer-theme-reference/target/viewer.war
          asset_name: viewer.war
          asset_content_type: application/zip
      - name: Upload config.tar.gz to Github Release
        uses: actions/upload-release-asset@v1.0.1
        id: upload-config-asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./config.tar.gz
          asset_name: config.tar.gz
          asset_content_type: application/gzip

